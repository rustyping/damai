<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Toko Damai v1.7.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .header-bg { background: #075E54; color: white; }
        .product-card { background: white; border-bottom: 1px solid #e2e8f0; padding: 12px 16px; }
        .variant-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
        .variant-scroll::-webkit-scrollbar { display: none; }
        
        /* Tombol Satuan Ramping */
        .btn-variant {
            flex: 0 0 auto;
            min-width: 100px;
            border-radius: 10px;
            padding: 6px 10px;
            text-align: center;
            transition: all 0.2s;
            border: 1px solid #e2e8f0;
        }

        /* Warna khusus per kolom agar mudah bedain (Emerald, Orange, Blue) */
        .v-emerald { background: #ecfdf5; border-color: #10b981; color: #065f46; }
        .v-orange { background: #fff7ed; border-color: #f97316; color: #9a3412; }
        .v-blue { background: #eff6ff; border-color: #3b82f6; color: #1e40af; }

        /* Style saat terpilih (Ada Qty) */
        .v-active { background: #1e293b !important; color: white !important; border-color: #1e293b !important; }

        .cat-btn { white-space: nowrap; padding: 8px 16px; border-radius: 20px; font-size: 11px; font-weight: 800; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); }
        .cat-btn-active { background: #fb923c !important; border-color: #fb923c !important; }
        
        .az-sidebar { position: fixed; right: 4px; top: 200px; display: flex; flex-direction: column; z-index: 40; background: rgba(255,255,255,0.8); backdrop-filter: blur(4px); padding: 8px 2px; border-radius: 10px; }
        .az-letter { font-size: 9px; font-weight: 900; height: 18px; width: 20px; display: flex; align-items: center; justify-content: center; color: #075E54; }
    </style>
</head>
<body class="pb-32">

    <header class="header-bg p-4 sticky top-0 z-50 shadow-lg">
        <div class="flex justify-between items-center mb-3">
            <div>
                <h1 class="text-xl font-black italic italic tracking-tighter">TOKO DAMAI</h1>
                <p class="text-[10px] font-bold opacity-80 uppercase">Malang <span id="header-update-date" class="ml-1 border-l border-white/30 pl-1"></span></p>
            </div>
            <button onclick="showPromo()" class="bg-orange-500 text-white px-3 py-1.5 rounded-lg text-[10px] font-black">PROMO</button>
        </div>
        <input type="text" id="searchInput" oninput="filterProducts()" placeholder="Cari..." class="w-full p-3 rounded-lg text-gray-900 font-bold mb-3 shadow-inner outline-none">
        <div class="flex items-center gap-2 overflow-x-auto no-scrollbar">
            <button id="btn-all" onclick="filterByCategory('SEMUA')" class="cat-btn cat-btn-active">SEMUA</button>
            <div id="category-bar" class="flex gap-2"></div>
        </div>
    </header>

    <div id="az-sidebar" class="az-sidebar"></div>
    <main id="katalog"></main>

    <div id="float-cart" onclick="toggleCart()" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-4 rounded-2xl shadow-2xl z-50 hidden flex items-center gap-4 border border-white/20">
        <i class="fas fa-shopping-cart text-orange-400"></i>
        <div class="text-sm font-black uppercase">Rp <span id="cart-price">0</span></div>
    </div>

    <script>
        const githubUrl = "https://raw.githubusercontent.com/rustyping/damai/main/listDamaiFull.csv?v=" + Date.now();
        const promoUrl = "https://raw.githubusercontent.com/rustyping/damai/main/promo.csv";
        let productsData = [], cart = {}, currentCategory = "SEMUA";

        async function loadData() {
            try {
                const response = await fetch(githubUrl);
                const csvText = await response.text();
                const rows = csvText.split(/\r?\n/).filter(row => row.trim() !== "");
                let catSet = new Set();
                
                productsData = rows.slice(1).map(row => {
                    const cols = row.split(',').map(c => c.trim().replace(/^"|"$/g, ''));
                    const nama = cols[2] || "";
                    if (!nama || nama.toLowerCase().includes("xxx") || nama.toLowerCase().includes("nama barang") || nama.includes("___")) return null;

                    catSet.add(cols[4] || "UMUM");
                    return { 
                        nama: nama, kategori: cols[4] || "UMUM", 
                        vars: [
                            {s: cols[6], d: cols[10], h: parseInt(cols[19]) || 0, w: 'v-emerald'},
                            {s: cols[7], d: cols[11], h: parseInt(cols[22]) || 0, w: 'v-orange'},
                            {s: cols[8], d: cols[12], h: parseInt(cols[25]) || 0, w: 'v-blue'}
                        ].filter(v => v.s && v.h > 0)
                    };
                }).filter(Boolean);

                productsData.sort((a,b) => a.nama.localeCompare(b.nama, 'id', {numeric:true}));
                
                const cb = document.getElementById('category-bar');
                Array.from(catSet).sort().forEach(c => {
                    cb.innerHTML += `<button onclick="filterByCategory('${c}')" class="cat-btn">${c}</button>`;
                });

                renderKatalog(productsData);
                fetchUpdateDate();
            } catch (e) { console.error(e); }
        }

        function renderKatalog(data) {
            const katalog = document.getElementById('katalog');
            katalog.innerHTML = data.map(p => `
                <div class="product-item product-card" data-nama="${p.nama.toLowerCase()}" data-kat="${p.kategori}">
                    <p class="text-[13px] font-black text-slate-800 mb-2 uppercase leading-tight">${p.nama}</p>
                    <div class="variant-scroll">
                        ${p.vars.map(v => `<div id="box-${getSafeId(p.nama, v.s)}">${renderBtn(p.nama, v.s, v.h, v.w, v.d)}</div>`).join('')}
                    </div>
                </div>
            `).join('');
            updateAZSidebar(data);
        }

        function renderBtn(nama, satuan, harga, warna, detail) {
            const key = `${nama} (${satuan})`;
            const qty = cart[key]?.qty || 0;
            const esc = nama.replace(/'/g, "\\'");
            
            if (qty === 0) {
                return `
                    <div onclick="updateCart('${esc}', '${satuan}', ${harga}, '${warna}', 1, '${detail}')" class="btn-variant ${warna} cursor-pointer">
                        <div class="text-[9px] font-bold uppercase opacity-70">${satuan} (${detail})</div>
                        <div class="text-sm font-black">Rp ${formatRupiah(harga)}</div>
                    </div>`;
            } else {
                return `
                    <div class="btn-variant v-active flex items-center justify-between gap-2">
                        <button onclick="updateCart('${esc}', '${satuan}', ${harga}, '${warna}', -1, '${detail}')" class="w-6 h-8 font-black">-</button>
                        <div class="text-center">
                            <div class="text-[8px] opacity-70 uppercase">${satuan}</div>
                            <div class="text-xs font-black">${qty}</div>
                        </div>
                        <button onclick="updateCart('${esc}', '${satuan}', ${harga}, '${warna}', 1, '${detail}')" class="w-6 h-8 font-black">+</button>
                    </div>`;
            }
        }

        function updateCart(nama, satuan, harga, warna, delta, detail) {
            const key = `${nama} (${satuan})`;
            if (!cart[key]) cart[key] = { qty: 0, harga: harga, namaAsli: nama, satuanAsli: satuan };
            cart[key].qty += delta;
            if (cart[key].qty <= 0) delete cart[key];
            
            const tid = getSafeId(nama, satuan);
            const el = document.getElementById(`box-${tid}`);
            if(el) el.innerHTML = renderBtn(nama, satuan, harga, warna, detail);
            
            let tPrice = 0;
            for (let k in cart) tPrice += (cart[k].qty * cart[k].harga);
            document.getElementById('cart-price').innerText = formatRupiah(tPrice);
            document.getElementById('float-cart').style.display = tPrice > 0 ? 'flex' : 'none';
        }

        function filterProducts() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.product-item').forEach(item => {
                const matchSearch = item.dataset.nama.includes(query);
                const matchKat = (currentCategory === "SEMUA" || item.dataset.kat === currentCategory);
                item.style.display = (matchSearch && matchKat) ? "block" : "none";
            });
        }

        function filterByCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.cat-btn, #btn-all').forEach(b => b.classList.toggle('cat-btn-active', b.innerText === cat));
            filterProducts();
        }

        async function fetchUpdateDate() {
            try {
                const response = await fetch(promoUrl + "?v=" + Date.now());
                const text = await response.text();
                const tgl = text.split('\n')[0].split(',')[0].replace(/"/g,'') || "Terbaru";
                document.getElementById('header-update-date').innerText = "Update: " + tgl;
            } catch (e) {}
        }

        function updateAZSidebar(data) {
            const sidebar = document.getElementById('az-sidebar');
            const letters = [...new Set(data.map(p => p.nama[0].toUpperCase()))].filter(c => /^[A-Z]/.test(c)).sort();
            sidebar.innerHTML = letters.map(l => `<div class="az-letter" onclick="scrollToLetter('${l}')">${l}</div>`).join('');
        }

        function scrollToLetter(l) {
            const target = [...document.querySelectorAll('.product-item')].find(i => i.style.display !== 'none' && i.dataset.nama[0].toUpperCase() === l);
            if(target) window.scrollTo({ top: target.offsetTop - 180, behavior: 'smooth' });
        }

        function formatRupiah(n) { return new Intl.NumberFormat('id-ID').format(n); }
        function getSafeId(n, s) { let hash = 0, seed = n + s; for (let i = 0; i < seed.length; i++) hash = ((hash << 5) - hash) + seed.charCodeAt(i); return 'p_' + Math.abs(hash); }
        function toggleCart() { /* Fungsi Ringkasan Order Bapak */ alert("Buka ringkasan order..."); }

        loadData();
    </script>
</body>
</html>
