<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Toko Damai v1.7.4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f0f4f8; }
        .header-bg { background: #075E54; color: white; }
        .product-card { background: white; border-radius: 20px; border: 1px solid #e2e8f0; margin-bottom: 0.75rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .product-name { color: #0f172a; font-weight: 800; text-transform: uppercase; border-bottom: 1px dashed #e2e8f0; padding-bottom: 6px; margin-bottom: 10px; font-size: 13px; }
        
        /* Grid Tombol Ramping */
        .variant-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        
        /* State Tombol Normal */
        .btn-price { 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 8px 4px; border-radius: 12px; transition: all 0.2s; height: 55px;
        }
        /* State Tombol Aktif (+/-) */
        .btn-counter { 
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            padding: 4px; border-radius: 12px; height: 55px; color: white;
        }

        .cat-btn { white-space: nowrap; padding: 10px 20px; border-radius: 12px; font-size: 11px; font-weight: 800; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); }
        .cat-btn-active { background: #fb923c !important; border-color: #fb923c !important; }
        
        .az-sidebar { position: fixed; right: 8px; top: 220px; display: flex; flex-direction: column; z-index: 40; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); padding: 12px 5px; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); }
        .az-letter { font-size: 10px; font-weight: 900; color: #075E54; width: 24px; height: 20px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="pb-40">

    <header class="header-bg p-5 sticky top-0 z-50 shadow-xl">
        <div class="flex justify-between items-center mb-4">
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter leading-none">TOKO DAMAI</h1>
                <p class="text-[11px] font-bold opacity-90 mt-1 uppercase">Malang <span id="header-update-date" class="ml-2 border-l border-white/30 pl-2"></span></p>
            </div>
            <div id="status" class="text-[9px] bg-black/20 px-2 py-1 rounded-md font-black uppercase">Memuat...</div>
        </div>
        <input type="text" id="searchInput" oninput="filterProducts()" placeholder="Cari barang..." class="w-full p-4 rounded-xl text-gray-900 font-bold mb-4 outline-none shadow-inner">
        <div class="flex items-center gap-2 overflow-x-auto">
            <button id="btn-all" onclick="filterByCategory('SEMUA')" class="cat-btn cat-btn-active">SEMUA</button>
            <div id="category-bar" class="flex gap-2"></div>
        </div>
    </header>

    <div id="az-sidebar" class="az-sidebar"></div>
    <main id="katalog" class="p-4 max-w-xl mx-auto"></main>

    <button id="float-cart" onclick="toggleCart()" class="fixed bottom-8 right-6 bg-orange-600 text-white px-7 py-5 rounded-2xl shadow-2xl z-50 hidden font-black flex items-center gap-3 active:scale-95 transition-all">
        <i class="fas fa-shopping-basket text-xl"></i>
        <div class="text-left leading-none">
            <p class="text-[10px] opacity-80 uppercase">Order (<span id="cart-total">0</span>)</p>
            <p class="text-lg">Rp <span id="cart-price">0</span></p>
        </div>
    </button>

    <div id="cart-footer" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden flex items-end">
        <div class="w-full bg-white rounded-t-[3rem] p-8 max-h-[92vh] overflow-y-auto">
            <div class="max-w-xl mx-auto">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-black text-2xl text-slate-800 italic">RINGKASAN ORDER</h3>
                    <button onclick="toggleCart()"><i class="fas fa-times-circle text-3xl text-slate-300"></i></button>
                </div>
                <div id="cart-list" class="divide-y divide-slate-100 mb-6"></div>
                <div class="bg-slate-900 text-white p-6 rounded-3xl mb-4 flex justify-between items-center">
                    <span class="font-bold uppercase text-xs">Total</span>
                    <span class="font-black text-2xl text-emerald-400">Rp <span id="summary-price">0</span></span>
                </div>
                <input type="text" id="custName" placeholder="NAMA ANDA..." class="w-full p-5 border-2 rounded-2xl font-black bg-slate-50 text-center uppercase mb-4">
                <button onclick="sendToWhatsApp()" class="w-full bg-[#25D366] text-white font-black py-5 rounded-2xl flex justify-center items-center gap-3 text-lg uppercase shadow-xl">
                    <i class="fab fa-whatsapp text-3xl"></i> KIRIM WA
                </button>
            </div>
        </div>
    </div>

    <script>
        const githubUrl = "https://raw.githubusercontent.com/rustyping/damai/main/listDamaiFull.csv?v=" + Date.now();
        let productsData = [], cart = {}, currentCategory = "SEMUA";

        async function loadData() {
            try {
                const response = await fetch(githubUrl);
                const csvText = await response.text();
                const rows = csvText.split(/\r?\n/).filter(row => row.trim() !== "");
                let catSet = new Set();
                
                productsData = rows.slice(1).map(row => {
                    const cols = row.split(',').map(c => c.trim().replace(/^"|"$/g, ''));
                    const nama = cols[2] || "";

                    // PAGAR PENGAMAN (Filter Sesuai Request)
                    if (!nama || nama.toLowerCase().includes("xxx") || 
                        nama.toLowerCase().includes("nama barang") || 
                        nama.includes("___") || 
                        nama.toLowerCase().includes("ongkos kirim")) return null;

                    catSet.add(cols[4] || "UMUM");
                    return { 
                        nama: nama, kategori: cols[4] || "UMUM", 
                        vars: [
                            {s: cols[6], d: cols[10], h: parseInt(cols[19]) || 0, color: 'emerald'},
                            {s: cols[7], d: cols[11], h: parseInt(cols[22]) || 0, color: 'orange'},
                            {s: cols[8], d: cols[12], h: parseInt(cols[25]) || 0, color: 'blue'}
                        ].filter(v => v.s && v.h > 0)
                    };
                }).filter(Boolean);

                productsData.sort((a,b) => a.nama.localeCompare(b.nama, 'id', {numeric:true}));
                
                const cb = document.getElementById('category-bar');
                Array.from(catSet).sort().forEach(c => {
                    cb.innerHTML += `<button onclick="filterByCategory('${c}')" class="cat-btn">${c}</button>`;
                });

                renderKatalog(productsData);
                document.getElementById('status').innerText = productsData.length + " ITEM";
            } catch (e) { console.error(e); }
        }

        function renderKatalog(data) {
            const katalog = document.getElementById('katalog');
            katalog.innerHTML = data.map(p => `
                <div class="product-item product-card p-4" data-nama="${p.nama.toLowerCase()}" data-kat="${p.kategori}">
                    <p class="product-name">${p.nama}</p>
                    <div class="variant-grid">
                        ${p.vars.map(v => `<div id="box-${getSafeId(p.nama, v.s)}">${renderBtn(p.nama, v.s, v.h, v.color, v.d)}</div>`).join('')}
                    </div>
                </div>
            `).join('');
            updateAZSidebar(data);
        }

        function renderBtn(nama, satuan, harga, color, detail) {
            const key = `${nama} (${satuan})`;
            const qty = cart[key]?.qty || 0;
            const esc = nama.replace(/'/g, "\\'");
            
            if (qty === 0) {
                return `
                <button onclick="updateCart('${esc}', '${satuan}', ${harga}, '${color}', 1, '${detail}')" 
                    class="w-full btn-price border border-${color}-200 bg-${color}-50 active:scale-95">
                    <span class="text-[9px] font-black text-${color}-700 uppercase leading-none mb-1">${satuan} (${detail})</span>
                    <span class="text-[11px] font-black text-slate-800">Rp ${formatRupiah(harga)}</span>
                </button>`;
            } else {
                return `
                <div class="w-full btn-counter bg-${color}-600 shadow-md">
                    <span class="text-[8px] font-bold uppercase leading-none">${satuan}</span>
                    <div class="flex items-center justify-around w-full">
                        <button onclick="updateCart('${esc}', '${satuan}', ${harga}, '${color}', -1, '${detail}')" class="text-lg font-black px-2">-</button>
                        <span class="text-[11px] font-black">${qty}</span>
                        <button onclick="updateCart('${esc}', '${satuan}', ${harga}, '${color}', 1, '${detail}')" class="text-lg font-black px-2">+</button>
                    </div>
                </div>`;
            }
        }

        function updateCart(nama, satuan, harga, color, delta, detail) {
            const key = `${nama} (${satuan})`;
            if (!cart[key]) cart[key] = { qty: 0, harga: harga, color: color, detail: detail, namaAsli: nama, satuanAsli: satuan };
            cart[key].qty += delta;
            if (cart[key].qty <= 0) delete cart[key];
            
            const tid = getSafeId(nama, satuan);
            const el = document.getElementById(`box-${tid}`);
            if(el) el.innerHTML = renderBtn(nama, satuan, harga, color, detail);
            updateTotals();
        }

        function updateTotals() {
            let tQty = 0, tPrice = 0;
            for (let k in cart) { tQty += cart[k].qty; tPrice += (cart[k].qty * cart[k].harga); }
            document.getElementById('cart-total').innerText = tQty;
            document.getElementById('cart-price').innerText = formatRupiah(tPrice);
            document.getElementById('summary-price').innerText = formatRupiah(tPrice);
            document.getElementById('float-cart').style.display = tQty > 0 ? 'flex' : 'none';
        }

        function filterProducts() {
            const q = document.getElementById('searchInput').value.toLowerCase().trim();
            document.querySelectorAll('.product-item').forEach(item => {
                const matchSearch = item.dataset.nama.includes(q);
                const matchKat = (currentCategory === "SEMUA" || item.dataset.kat === currentCategory);
                item.style.display = (matchSearch && matchKat) ? "block" : "none";
            });
        }

        function filterByCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.cat-btn, #btn-all').forEach(b => b.classList.toggle('cat-btn-active', b.innerText === cat));
            filterProducts();
        }

        function updateAZSidebar(data) {
            const sidebar = document.getElementById('az-sidebar');
            const letters = [...new Set(data.map(p => p.nama[0].toUpperCase()))].filter(c => /^[A-Z]/.test(c)).sort();
            sidebar.innerHTML = letters.map(l => `<div class="az-letter" onclick="scrollToLetter('${l}')">${l}</div>`).join('');
        }

        function scrollToLetter(l) {
            const target = [...document.querySelectorAll('.product-item')].find(i => i.style.display !== 'none' && i.dataset.nama[0].toUpperCase() === l);
            if(target) window.scrollTo({ top: target.offsetTop - 180, behavior: 'smooth' });
        }

        function toggleCart() { 
            document.getElementById('cart-footer').classList.toggle('hidden'); 
            if(!document.getElementById('cart-footer').classList.contains('hidden')) renderCartList();
        }

        function renderCartList() {
            const l = document.getElementById('cart-list');
            l.innerHTML = Object.values(cart).map(item => `
                <div class="py-3 flex justify-between items-center uppercase text-xs">
                    <div><p class="font-black">${item.namaAsli}</p><p class="text-[9px] text-slate-500">${item.satuanAsli}</p></div>
                    <div class="font-black">x ${item.qty}</div>
                </div>
            `).join('');
        }

        function sendToWhatsApp() {
            const name = document.getElementById('custName').value.trim();
            if (!name) return alert("ISI NAMA!");
            let total = 0, text = `*ORDER TOKO DAMAI*\n👤 Nama: *${name.toUpperCase()}*\n\n`;
            for (let k in cart) {
                let sub = cart[k].qty * cart[k].harga;
                text += `✅ *${cart[k].namaAsli}*\n   ${cart[k].qty} ${cart[k].satuanAsli} = *Rp ${formatRupiah(sub)}*\n`;
                total += sub;
            }
            text += `\n💰 *TOTAL: Rp ${formatRupiah(total)}*`;
            window.open(`https://wa.me/6285815022210?text=${encodeURIComponent(text)}`);
        }

        function formatRupiah(n) { return new Intl.NumberFormat('id-ID').format(n); }
        function getSafeId(n, s) { let hash = 0; let seed = n + s; for (let i = 0; i < seed.length; i++) hash = ((hash << 5) - hash) + seed.charCodeAt(i); return 'p_' + Math.abs(hash); }

        loadData();
    </script>
</body>
</html>
