<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Toko Damai v1.7.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #ffffff 0%, #f0f4f8 100%); background-attachment: fixed; }
        #scroll-progress { position: fixed; top: 0; left: 0; width: 0%; height: 4px; background: #fb923c; z-index: 100; transition: width 0.1s; }
        .az-sidebar { position: fixed; right: 8px; top: 220px; display: flex; flex-direction: column; z-index: 40; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); padding: 12px 5px; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); border: 1px solid rgba(0,0,0,0.05); max-height: 65vh; overflow-y: auto; }
        .az-sidebar::-webkit-scrollbar { display: none; }
        .az-letter { font-size: 10px; font-weight: 900; color: #075E54; width: 24px; height: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; }
        .az-letter:hover { color: #fb923c; transform: scale(1.3); }
        .header-bg { background: #075E54; color: white; }
        #katalog { padding-top: 10px; padding-bottom: 120px; }
        .product-card { background: #ffffff; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); margin-bottom: 0.75rem; transition: transform 0.2s ease; }
        .category-scroll::-webkit-scrollbar { display: none; }
        .cat-btn { white-space: nowrap; padding: 10px 20px; border-radius: 12px; font-size: 11px; font-weight: 800; text-transform: uppercase; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }
        .cat-btn-active { background: #fb923c !important; border-color: #fb923c !important; }
        .product-name { color: #0f172a; font-weight: 800; text-transform: uppercase; }
        .sticky-all { position: sticky; left: 0; z-index: 20; background: #075E54; padding-right: 12px; }
        @keyframes pulse-orange { 0% { box-shadow: 0 0 0 0 rgba(251, 146, 60, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(251, 146, 60, 0); } 100% { box-shadow: 0 0 0 0 rgba(251, 146, 60, 0); } }
        .btn-promo { animation: pulse-orange 2s infinite; background: #fb923c; color: white; padding: 6px 14px; border-radius: 10px; font-size: 11px; font-weight: 900; }
        .promo-table { width: 100%; border-collapse: collapse; }
        .promo-table th { background: #f8fafc; text-align: left; padding: 12px; border-bottom: 2px solid #e2e8f0; font-size: 10px; text-transform: uppercase; color: #64748b; font-weight: 800; }
        .promo-table td { padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
    </style>
</head>
<body class="pb-40 text-gray-900">
    <div id="scroll-progress"></div>
    <header class="header-bg p-5 sticky top-0 z-50 shadow-2xl">
        <div class="mb-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <div>
                        <h1 class="text-3xl font-black italic tracking-tighter leading-none">TOKO DAMAI</h1>
                        <p class="text-[11px] font-bold opacity-90 mt-1 uppercase">
                            Malang <span id="header-update-date" class="ml-2 border-l border-white/30 pl-2"></span>
                        </p>
                    </div>
                    <button onclick="showPromo()" class="btn-promo active:scale-90 transition-transform flex items-center gap-2">
                        <i class="fas fa-fire-alt animate-bounce"></i> PROMO
                    </button>
                </div>
                <div id="status" class="text-[9px] bg-black/20 px-2 py-1 rounded-md font-black uppercase tracking-widest">Memuat...</div>
            </div>
        </div>
        <input type="text" id="searchInput" oninput="filterProducts()" onfocus="resetToAll()" placeholder="Cari nama barang..." class="w-full p-4 rounded-xl text-gray-900 font-bold outline-none mb-4">
        <div class="flex items-center overflow-hidden">
            <div class="sticky-all"><button id="btn-all" onclick="filterByCategory('SEMUA')" class="cat-btn cat-btn-active">SEMUA</button></div>
            <div id="category-bar" class="flex overflow-x-auto category-scroll gap-2 py-2"></div>
        </div>
    </header>

    <div id="az-sidebar" class="az-sidebar"></div>
    <main id="katalog" class="p-4 max-w-xl mx-auto"></main>

    <div id="promo-modal" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[110] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] overflow-hidden shadow-2xl border-4 border-orange-400/20">
            <div class="bg-gradient-to-r from-orange-500 to-red-500 p-6 text-white flex justify-between items-center">
                <h3 class="font-black text-xl italic leading-none">PROMO <span id="promo-date" class="ml-2 text-[10px] bg-white/20 px-2 py-1 rounded">...</span></h3>
                <button onclick="closePromo()" class="text-2xl font-bold">&times;</button>
            </div>
            <div class="p-2 max-h-[60vh] overflow-y-auto" id="promo-content"></div>
            <div class="p-6 bg-gray-50 text-center"><button onclick="closePromo()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-sm uppercase">SAYA MENGERTI</button></div>
        </div>
    </div>

    <button id="float-cart" onclick="toggleCart()" class="fixed bottom-8 right-6 bg-orange-600 text-white px-7 py-5 rounded-2xl shadow-2xl z-50 hidden font-black flex items-center gap-3">
        <i class="fas fa-shopping-basket text-xl"></i>
        <div class="text-left leading-none"><p class="text-[10px] opacity-80">Total Order (<span id="cart-total">0</span>)</p><p class="text-lg">Rp <span id="cart-price">0</span></p></div>
    </button>

    <div id="cart-footer" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden flex items-end">
        <div class="w-full bg-white rounded-t-[3rem] p-8 max-h-[92vh] overflow-y-auto">
            <div class="max-w-xl mx-auto">
                <div class="flex justify-between items-center mb-6"><h3 class="font-black text-2xl text-slate-800 italic">RINGKASAN ORDER</h3><button onclick="toggleCart()"><i class="fas fa-times-circle text-3xl text-slate-300"></i></button></div>
                <div id="cart-list" class="divide-y divide-slate-100 mb-6"></div>
                <div class="bg-slate-900 text-white p-6 rounded-3xl mb-4 flex justify-between items-center shadow-lg"><span class="font-bold text-xs opacity-60 uppercase">Total Bayar</span><span class="font-black text-2xl text-emerald-400">Rp <span id="summary-price">0</span></span></div>
                <input type="text" id="custName" placeholder="TULIS NAMA ANDA..." class="w-full p-5 border-2 rounded-2xl font-black bg-slate-50 text-center uppercase mb-4 outline-none">
                <button onclick="sendToWhatsApp()" class="w-full bg-[#25D366] text-white font-black py-5 rounded-2xl flex justify-center items-center gap-3 shadow-xl uppercase"><i class="fab fa-whatsapp text-3xl"></i> KIRIM KE WHATSAPP</button>
            </div>
        </div>
    </div>

    <script>
        const githubUrl = "https://raw.githubusercontent.com/rustyping/damai/main/listDamaiFull.csv?v=" + Date.now();
        const promoUrl = "https://raw.githubusercontent.com/rustyping/damai/main/promo.csv";
        let productsData = [], cart = {}, currentCategory = "SEMUA", searchTimeout;

        async function loadData() {
            try {
                const response = await fetch(githubUrl);
                const csvText = await response.text();
                const rows = csvText.split(/\r?\n/).filter(row => row.trim() !== "");
                let catSet = new Set();
                
                productsData = rows.slice(1).map(row => {
                    const cols = row.split(',').map(c => c.trim().replace(/^"|"$/g, ''));
                    const nama = cols[2] || "";

                    // FILTER XXX & SAMPAH
                    if (!nama || nama.toLowerCase().includes("xxx") || nama.toLowerCase().includes("nama barang") || nama.includes("___") || nama.toLowerCase().includes("ongkos kirim")) return null;

                    catSet.add(cols[4] || "UMUM");
                    return { 
                        nama: nama, kategori: cols[4] || "UMUM", 
                        s1: cols[6], s2: cols[7], s3: cols[8],
                        d1: cols[10] || "1", d2: cols[11] || "1", d3: cols[12] || "1",
                        h1: parseInt(cols[19]) || 0, h2: parseInt(cols[22]) || 0, h3: parseInt(cols[25]) || 0 
                    };
                }).filter(Boolean);

                productsData.sort((a,b) => a.nama.localeCompare(b.nama, 'id', {numeric:true}));
                
                const b = document.getElementById('category-bar');
                b.innerHTML = "";
                Array.from(catSet).sort().forEach(c => {
                    b.innerHTML += `<button onclick="filterByCategory('${c}')" class="cat-btn">${c}</button>`;
                });

                renderKatalog(productsData);
                document.getElementById('status').innerText = productsData.length + " ITEM";
            } catch (e) { console.error(e); }
        }

        function renderKatalog(data) {
            const katalog = document.getElementById('katalog');
            let content = `<div class="grid gap-1">`;
            data.forEach(p => {
                content += `
                <div class="product-item product-card p-5 rounded-3xl" data-nama="${p.nama.toLowerCase()}" data-kat="${p.kategori}">
                    <p class="product-name text-base mb-4 tracking-tight">${p.nama}</p>
                    <div class="grid gap-3">
                        ${p.s1 && p.h1 > 0 ? `<div id="box-${getSafeId(p.nama, p.s1)}">${renderBtn(p.nama, p.s1, p.h1, 'emerald', p.d1)}</div>` : ''}
                        ${p.s2 && p.h2 > 0 ? `<div id="box-${getSafeId(p.nama, p.s2)}">${renderBtn(p.nama, p.s2, p.h2, 'orange', p.d2)}</div>` : ''}
                        ${p.s3 && p.h3 > 0 ? `<div id="box-${getSafeId(p.nama, p.s3)}">${renderBtn(p.nama, p.s3, p.h3, 'blue', p.d3)}</div>` : ''}
                    </div>
                </div>`;
            });
            katalog.innerHTML = content + `</div>`;
            updateAZSidebar(data);
        }

        function renderBtn(nama, satuan, harga, warna, detail) {
            const key = `${nama} (${satuan})`;
            const qty = cart[key]?.qty || 0;
            const esc = nama.replace(/'/g, "\\'");
            const label = `${satuan} (${detail})`;
            if (qty === 0) {
                return `<div class="flex items-center justify-between bg-${warna}-50 rounded-2xl border border-${warna}-100 overflow-hidden">
                    <div class="pl-4 py-2"><p class="text-[10px] font-black text-${warna}-700 uppercase italic mb-0.5">${label}</p><p class="text-sm font-black text-slate-700">Rp ${formatRupiah(harga)}</p></div>
                    <button onclick="updateCart('${esc}', '${satuan}', ${harga}, '${warna}', 1, '${detail}')" class="bg-${warna}-600 text-white px-6 py-4 text-xs font-black uppercase">+ BELI</button>
                </div>`;
            } else {
                return `<div class="flex items-center justify-between bg-${warna}-600 text-white rounded-2xl border-2 border-${warna}-700 shadow-lg overflow-hidden">
                    <div class="pl-4 py-2"><p class="text-[10px] font-black uppercase italic text-white/80">${label}</p><p class="text-sm font-black">Rp ${formatRupiah(harga)}</p></div>
                    <div class="flex items-center bg-black/10">
                        <button onclick="updateCart('${esc}', '${satuan}', ${harga}, '${warna}', -1, '${detail}')" class="w-10 h-12 font-black text-xl">-</button>
                        <input type="number" value="${qty}" onchange="editQty('${esc}', '${satuan}', this.value, ${harga}, '${warna}', '${detail}')" class="w-10 bg-transparent text-center font-black text-sm outline-none text-white">
                        <button onclick="updateCart('${esc}', '${satuan}', ${harga}, '${warna}', 1, '${detail}')" class="w-10 h-12 font-black text-xl">+</button>
                    </div>
                </div>`;
            }
        }

        function filterProducts() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                const query = document.getElementById('searchInput').value.toLowerCase().trim();
                const keywords = query.split(/\s+/);
                let visibleCount = 0;
                let visibleData = [];
                document.querySelectorAll('.product-item').forEach(item => {
                    const nama = item.dataset.nama;
                    const matchKat = (currentCategory === "SEMUA" || item.dataset.kat === currentCategory);
                    const matchSearch = (query === "" || keywords.every(kw => nama.includes(kw)));
                    if (matchKat && matchSearch) {
                        item.style.display = "block";
                        visibleCount++;
                        const original = productsData.find(p => p.nama.toLowerCase() === nama);
                        if(original) visibleData.push(original);
                    } else { item.style.display = "none"; }
                });
                document.getElementById('status').innerText = visibleCount + " ITEM";
                updateAZSidebar(visibleData);
            }, 150);
        }

        function updateCart(nama, satuan, harga, warna, delta, detail) {
            const key = `${nama} (${satuan})`;
            if (!cart[key]) cart[key] = { qty: 0, harga: harga, warna: warna, detail: detail, namaAsli: nama, satuanAsli: satuan };
            cart[key].qty += delta;
            if (cart[key].qty <= 0) delete cart[key];
            const tid = getSafeId(nama, satuan);
            const el = document.getElementById(`box-${tid}`);
            if(el) el.innerHTML = renderBtn(nama, satuan, harga, warna, detail);
            updateTotals();
            if(!document.getElementById('cart-footer').classList.contains('hidden')) renderCartList();
        }

        function updateTotals() {
            let tQty = 0, tPrice = 0;
            for (let k in cart) { tQty += cart[k].qty; tPrice += (cart[k].qty * cart[k].harga); }
            document.getElementById('cart-total').innerText = tQty;
            document.getElementById('cart-price').innerText = formatRupiah(tPrice);
            document.getElementById('summary-price').innerText = formatRupiah(tPrice);
            document.getElementById('float-cart').style.display = tQty > 0 ? 'flex' : 'none';
        }

        function renderCartList() {
            const l = document.getElementById('cart-list');
            l.innerHTML = "";
            for(let k in cart) {
                const item = cart[k];
                const esc = item.namaAsli.replace(/'/g, "\\'");
                l.innerHTML += `<div class="py-4 flex justify-between items-center"><div class="flex-1 pr-4"><p class="text-lg font-black text-slate-800 uppercase leading-tight">${item.namaAsli}</p><p class="text-xs font-bold text-slate-500 italic uppercase">${item.satuanAsli}</p></div><div class="flex items-center bg-slate-100 rounded-xl p-1"><button onclick="updateCart('${esc}', '${item.satuanAsli}', ${item.harga}, '${item.warna}', -1, '${item.detail}')" class="w-8 h-8 font-black">-</button><input type="number" value="${item.qty}" class="w-10 bg-transparent text-center font-black text-sm outline-none" readonly><button onclick="updateCart('${esc}', '${item.satuanAsli}', ${item.harga}, '${item.warna}', 1, '${item.detail}')" class="w-8 h-8 font-black text-emerald-600">+</button></div></div>`;
            }
        }

        async function fetchUpdateDate() {
            try {
                const response = await fetch(promoUrl + "?v=" + Date.now());
                const text = await response.text();
                const rows = text.split(/\r?\n/).filter(r => r.trim() !== "");
                if (rows.length > 0) {
                    const tgl = rows[0].split(',')[0].trim().replace(/^"|"$/g, '') || "Terbaru";
                    document.getElementById('header-update-date').innerText = "Update: " + tgl;
                }
            } catch (e) { console.log("Gagal fetch update date"); }
        }

        async function showPromo() {
            const modal = document.getElementById('promo-modal');
            const content = document.getElementById('promo-content');
            modal.classList.remove('hidden');
            content.innerHTML = `<p class="text-center py-10 text-gray-400 font-bold">Memuat...</p>`;
            try {
                const response = await fetch(promoUrl + "?v=" + Date.now());
                const csvText = await response.text();
                const rows = csvText.split(/\r?\n/).filter(r => r.trim() !== "");
                if (rows.length < 2) { content.innerHTML = "<p class='text-center py-10'>Belum ada promo.</p>"; return; }
                let html = `<table class="promo-table"><thead><tr><th>Barang</th><th>Harga</th></tr></thead><tbody>`;
                rows.slice(1).forEach(row => {
                    const cols = row.split(',').map(c => c.trim().replace(/^"|"$/g, ''));
                    if (cols[1]) html += `<tr><td class="font-bold uppercase">${cols[1]}<br><span class="text-[9px] text-orange-500">${cols[2] || ''}</span></td><td><span class="bg-red-500 text-white px-3 py-1 rounded-lg font-black">Rp ${cols[3]}</span></td></tr>`;
                });
                content.innerHTML = html + `</tbody></table>`;
            } catch (e) { content.innerHTML = "Gagal memuat promo."; }
        }

        function updateAZSidebar(data) {
            const sidebar = document.getElementById('az-sidebar');
            const letters = [...new Set(data.map(p => p.nama[0].toUpperCase()))].filter(c => /^[A-Z]/.test(c)).sort();
            sidebar.innerHTML = "";
            letters.forEach(l => {
                const btn = document.createElement('div');
                btn.className = "az-letter";
                btn.innerText = l;
                btn.onclick = () => {
                    const target = [...document.querySelectorAll('.product-item')].find(item => item.style.display !== 'none' && item.dataset.nama[0].toUpperCase() === l);
                    if(target) window.scrollTo({ top: target.getBoundingClientRect().top + window.pageYOffset - 180, behavior: 'smooth' });
                };
                sidebar.appendChild(btn);
            });
        }

        function closePromo() { document.getElementById('promo-modal').classList.add('hidden'); }
        function filterByCategory(cat) { document.getElementById('searchInput').value = ""; currentCategory = cat; document.querySelectorAll('.cat-btn, #btn-all').forEach(b => b.classList.toggle('cat-btn-active', b.innerText === cat)); filterProducts(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
        function resetToAll() { if (currentCategory !== "SEMUA") filterByCategory('SEMUA'); }
        function formatRupiah(n) { return new Intl.NumberFormat('id-ID').format(n); }
        function getSafeId(n, s) { let hash = 0, seed = n + s; for (let i = 0; i < seed.length; i++) hash = ((hash << 5) - hash) + seed.charCodeAt(i); return 'p_' + Math.abs(hash); }
        function editQty(nama, satuan, val, harga, warna, detail) { const qty = parseInt(val); const currentQty = cart[`${nama} (${satuan})`]?.qty || 0; updateCart(nama, satuan, harga, warna, (isNaN(qty) || qty <= 0 ? -currentQty : qty - currentQty), detail); }
        function toggleCart() { document.getElementById('cart-footer').classList.toggle('hidden'); if(!document.getElementById('cart-footer').classList.contains('hidden')) renderCartList(); }
        function sendToWhatsApp() {
            const name = document.getElementById('custName').value.trim();
            if (!name) return alert("ISI NAMA ANDA!");
            let total = 0, p = `*ORDER TOKO DAMAI*\n👤 Nama: *${name.toUpperCase()}*\n\n`;
            for (let k in cart) { let sub = cart[k].qty * cart[k].harga; p += `✅ *${cart[k].namaAsli}*\n   ${cart[k].qty} ${cart[k].satuanAsli} = *Rp ${formatRupiah(sub)}*\n`; total += sub; }
            p += `\n💰 *TOTAL: Rp ${formatRupiah(total)}*`;
            window.open(`https://wa.me/6285815022210?text=${encodeURIComponent(p)}`);
        }

        window.onscroll = () => {
            let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            document.getElementById("scroll-progress").style.width = (winScroll / height) * 100 + "%";
        };

        loadData();
        fetchUpdateDate();
    </script>
</body>
</html>
