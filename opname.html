<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blind Opname Stok - Toko Damai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        header { padding: 10px 16px 6px 16px !important; background: #0f172a; color: white; }
        #searchInput { margin-bottom: 6px !important; padding: 10px 16px !important; font-size: 16px !important; border-radius: 12px; width: 100%; color: black; outline: none; }
        #checkerInput { padding: 12px 16px !important; font-size: 14px !important; border-radius: 10px; width: 100%; color: black; outline: none; font-weight: 700; border: 2px solid #cbd5e1; }
        #checkerInput:focus { border-color: #0f172a; }
        .product-card { background: white; border: 1px solid #e2e8f0; margin-bottom: 0.4rem; padding: 12px !important; border-radius: 14px; }
        .product-name { color: #0f172a; font-weight: 850; text-transform: uppercase; line-height: 1.2; font-size: 14px; }
        .opname-input { width: 65px; text-align: center; font-weight: 900; border: 2px solid #cbd5e1; border-radius: 8px; padding: 6px 0; font-size: 14px; background: #f8fafc; }
        .opname-input:focus { border-color: #0f172a; outline: none; background: #fff; }
        .cat-btn { white-space: nowrap; padding: 6px 16px; border-radius: 12px; font-size: 11px; font-weight: 800; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); }
        .cat-btn-active { background: #3b82f6 !important; border-color: #3b82f6 !important; }
        .unit-label { font-size: 9px; font-weight: 900; color: #64748b; text-transform: uppercase; text-align: center; margin-bottom: 2px; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 65px; }
    </style>
</head>
<body class="pb-32">

    <header class="sticky top-0 z-50 shadow-lg">
        <div class="mb-2 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black italic tracking-tighter">BLIND OPNAME DAMAI</h1>
                <p class="text-[9px] font-bold opacity-80 uppercase">Perhitungan Fisik Murni</p>
            </div>
            <button onclick="resetOpname()" class="text-[10px] bg-red-600 px-2 py-1 rounded font-black tracking-wider uppercase active:scale-95 transition-all">
                <i class="fas fa-trash-alt"></i> Reset
            </button>
        </div>
        <input type="text" id="searchInput" oninput="filterOpname()" placeholder="Cari nama barang...">
        <div class="flex items-center overflow-hidden">
            <button id="btn-all" onclick="filterByCategory('SEMUA')" class="cat-btn cat-btn-active mr-2">SEMUA</button>
            <div id="category-bar" class="flex overflow-x-auto gap-2 py-1"></div>
        </div>
    </header>

    <main id="katalog-opname" class="p-4 max-w-xl mx-auto"></main>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 shadow-2xl z-40">
        <div class="bg-slate-100 px-4 py-2 border-b border-slate-200 text-xs font-bold text-slate-700 flex justify-between items-center max-w-xl mx-auto">
            <div>Items Dihitung: <span id="summary-items" class="text-blue-600 font-black">0</span></div>
            <div>Total Qty (Terkecil): <span id="summary-qty" class="text-emerald-600 font-black">0</span></div>
        </div>
        
        <div class="p-4 max-w-xl mx-auto">
            <button onclick="toggleSummaryWindow()" class="w-full bg-slate-900 text-white font-black py-4 rounded-xl flex justify-center items-center gap-2 shadow-md text-sm uppercase tracking-wider active:scale-95 transition-all">
                <i class="fas fa-clipboard-list text-lg"></i> Lihat Ringkasan Opname
            </button>
        </div>
    </div>

    <div id="summary-window" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden flex items-end">
        <div class="w-full bg-white rounded-t-[2.5rem] p-6 shadow-2xl max-h-[85vh] overflow-y-auto">
            <div class="max-w-xl mx-auto">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-black text-xl italic text-slate-800 tracking-tight">RINGKASAN HASIL OPNAME</h3>
                    <button onclick="toggleSummaryWindow()" class="text-3xl text-slate-400">&times;</button>
                </div>

                <div class="mb-4">
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Nama Pengecek / Checker:</label>
                    <input type="text" id="checkerInput" placeholder="TULIS NAMA CHECKER..." oninput="saveCheckerName(this.value)">
                </div>

                <div class="border border-slate-100 rounded-2xl max-h-[30vh] overflow-y-auto p-3 bg-slate-50 mb-4 divide-y divide-slate-200 text-xs font-medium text-slate-700 shadow-inner" id="summary-list-items">
                    </div>

                <div class="p-4 bg-slate-900 text-white rounded-2xl mb-4 flex justify-between items-center">
                    <span class="font-bold text-xs uppercase text-slate-400">Total Macam Item</span>
                    <span class="font-black text-lg text-emerald-400"><span id="window-total-items">0</span> Item</span>
                </div>

                <div class="flex gap-3">
                    <button onclick="downloadCSV()" class="flex-1 bg-slate-800 text-white font-black py-4 rounded-xl flex justify-center items-center gap-2 shadow-md text-sm active:scale-95 transition-all">
                        <i class="fas fa-file-download text-lg"></i> SIMPAN CSV
                    </button>
                    <button onclick="kirimHasilWA()" class="flex-1 bg-[#25D366] text-white font-black py-4 rounded-xl flex justify-center items-center gap-2 shadow-md text-sm active:scale-95 transition-all">
                        <i class="fab fa-whatsapp text-xl"></i> LAPOR KE WA
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const githubUrl = "https://raw.githubusercontent.com/rustyping/damai/main/listDamaiFull.csv
